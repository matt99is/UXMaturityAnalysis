# Pre-commit hooks for Python code quality
# Run automatically before each git commit

repos:
  # Vault project note guard - keep startup note bounded and non-changelog.
  - repo: local
    hooks:
      - id: vault-note-guard
        name: vault-note-guard
        entry: python3 scripts/check_vault.py --strict-missing
        language: system
        pass_filenames: false

  # Black - Python code formatter
  - repo: https://github.com/psf/black
    rev: 26.1.0
    hooks:
      - id: black
        language_version: python3.12
        types: [python]
        exclude: ^(templates/|\.venv/)  # Skip templates and venv

  # isort - Import organizer
  - repo: https://github.com/pycqa/isort
    rev: 8.0.0
    hooks:
      - id: isort
        language_version: python3.12
        args: ["--profile", "black"]
        types: [python]
        exclude: ^(templates/|\.venv/)  # Skip templates and venv

  # flake8 - Style and quality linter
  - repo: https://github.com/pycqa/flake8
    rev: 7.1.0
    hooks:
      - id: flake8
        language_version: python3.12
        types: [python]
        exclude: ^(templates/|\.venv/)  # Skip templates and venv
